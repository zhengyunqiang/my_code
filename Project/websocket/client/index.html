<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket 实时协作平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <!-- 连接状态 -->
            <div class="connection-status">
                <div class="status-indicator" id="connectionStatus">
                    <span class="status-dot"></span>
                    <span class="status-text">未连接</span>
                </div>
                <button id="connectBtn" class="btn btn-primary">连接</button>
            </div>

            <!-- 用户信息 -->
            <div class="user-panel" id="userPanel" style="display: none;">
                <div class="user-avatar" id="userAvatar">
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23666'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E" alt="用户头像">
                </div>
                <div class="user-info">
                    <div class="user-name" id="userName">访客</div>
                    <div class="user-status" id="userStatus">在线</div>
                </div>
            </div>

            <!-- 房间列表 -->
            <div class="rooms-section">
                <div class="section-header">
                    <h3>房间</h3>
                    <button class="btn-icon" id="createRoomBtn" title="创建房间">+</button>
                </div>
                <div class="room-list" id="roomList">
                    <!-- 房间列表将动态生成 -->
                </div>
            </div>

            <!-- 在线用户 -->
            <div class="users-section">
                <div class="section-header">
                    <h3>在线用户</h3>
                    <span class="user-count" id="userCount">0</span>
                </div>
                <div class="user-list" id="userList">
                    <!-- 用户列表将动态生成 -->
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 登录表单 -->
            <div class="login-container" id="loginContainer">
                <div class="login-box">
                    <h2>登录</h2>
                    <form id="loginForm">
                        <div class="form-group">
                            <label for="username">用户名</label>
                            <input type="text" id="username" class="form-control" placeholder="请输入用户名" required>
                        </div>
                        <div class="form-group">
                            <label for="password">密码</label>
                            <input type="password" id="password" class="form-control" placeholder="请输入密码" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">登录</button>
                    </form>
                    <div class="login-footer">
                        <span>还没有账号？</span>
                        <a href="#" id="showRegisterBtn">注册</a>
                    </div>
                </div>
            </div>

            <!-- 注册表单 -->
            <div class="register-container" id="registerContainer" style="display: none;">
                <div class="register-box">
                    <h2>注册</h2>
                    <form id="registerForm">
                        <div class="form-group">
                            <label for="regUsername">用户名</label>
                            <input type="text" id="regUsername" class="form-control" placeholder="请输入用户名" required>
                        </div>
                        <div class="form-group">
                            <label for="regPassword">密码</label>
                            <input type="password" id="regPassword" class="form-control" placeholder="请输入密码" required>
                        </div>
                        <div class="form-group">
                            <label for="regDisplayName">显示名称</label>
                            <input type="text" id="regDisplayName" class="form-control" placeholder="请输入显示名称">
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">注册</button>
                    </form>
                    <div class="register-footer">
                        <span>已有账号？</span>
                        <a href="#" id="showLoginBtn">登录</a>
                    </div>
                </div>
            </div>

            <!-- 聊天区域 -->
            <div class="chat-container" id="chatContainer" style="display: none;">
                <!-- 聊天头部 -->
                <div class="chat-header">
                    <div class="chat-title">
                        <h3 id="currentRoomName">公共大厅</h3>
                        <span class="room-info" id="roomInfo"></span>
                    </div>
                    <div class="chat-actions">
                        <button class="btn-icon" id="leaveRoomBtn" title="离开房间">←</button>
                        <button class="btn-icon" id="roomSettingsBtn" title="房间设置">⚙</button>
                    </div>
                </div>

                <!-- 消息区域 -->
                <div class="messages-container">
                    <div class="messages" id="messages">
                        <!-- 消息将动态生成 -->
                    </div>
                </div>

                <!-- 输入区域 -->
                <div class="input-container">
                    <div class="typing-indicator" id="typingIndicator">
                        <!-- 正在输入指示器 -->
                    </div>
                    <div class="input-wrapper">
                        <button class="btn-icon" id="emojiBtn" title="表情">😊</button>
                        <textarea id="messageInput" class="message-input" placeholder="输入消息..." rows="1"></textarea>
                        <button class="btn btn-primary" id="sendBtn">发送</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- 右侧信息面板 -->
        <aside class="info-panel" id="infoPanel" style="display: none;">
            <div class="info-header">
                <h3>房间信息</h3>
                <button class="btn-icon close-panel" id="closeInfoPanel">×</button>
            </div>
            <div class="info-content" id="infoContent">
                <!-- 房间详细信息 -->
            </div>
        </aside>
    </div>

    <!-- 创建房间模态框 -->
    <div class="modal" id="createRoomModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>创建房间</h3>
                <button class="btn-icon close-modal" id="closeCreateRoomModal">×</button>
            </div>
            <div class="modal-body">
                <form id="createRoomForm">
                    <div class="form-group">
                        <label for="roomName">房间名称</label>
                        <input type="text" id="roomName" class="form-control" placeholder="请输入房间名称" required>
                    </div>
                    <div class="form-group">
                        <label for="roomId">房间ID (可选)</label>
                        <input type="text" id="roomId" class="form-control" placeholder="留空自动生成">
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="isPrivate">
                            私密房间
                        </label>
                    </div>
                    <div class="form-group" id="passwordGroup" style="display: none;">
                        <label for="roomPassword">房间密码</label>
                        <input type="password" id="roomPassword" class="form-control" placeholder="设置房间密码">
                    </div>
                    <div class="form-group">
                        <label for="maxClients">最大人数 (可选)</label>
                        <input type="number" id="maxClients" class="form-control" placeholder="留空无限制" min="1">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">创建</button>
                </form>
            </div>
        </div>
    </div>

    <!-- 系统通知 -->
    <div class="notifications" id="notifications">
        <!-- 通知将动态生成 -->
    </div>

    <script src="js/app.js"></script>
</body>
</html>
