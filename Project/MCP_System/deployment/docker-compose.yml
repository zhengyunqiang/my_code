# MCP System Docker Compose
# 完整的生产环境配置

version: '3.8'

services:
  # ========================================
  # MCP System 服务
  # ========================================
  mcp-system:
    build:
      context: ..
      dockerfile: deployment/docker/Dockerfile
    container_name: mcp-system
    restart: unless-stopped
    ports:
      - "8000:8000"   # HTTP API
      - "9090:9090"   # Metrics
    environment:
      # 应用配置
      - APP_NAME=MCP System
      - APP_VERSION=1.0.0
      - ENVIRONMENT=production
      - DEBUG=false

      # 服务器配置
      - HOST=0.0.0.0
      - PORT=8000
      - TRANSPORT_TYPE=http

      # 数据库配置
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/mcp_db
      - DATABASE_ECHO=false
      - DATABASE_POOL_SIZE=10
      - DATABASE_MAX_OVERFLOW=20

      # Redis 配置
      - REDIS_URL=redis://redis:6379/0
      - REDIS_DECODE_RESPONSES=true

      # JWT 配置
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440

      # 速率限制
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_PER_MINUTE=60
      - RATE_LIMIT_WINDOW=60

      # 日志配置
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - LOG_OUTPUT=both
      - LOG_FILE_PATH=/app/logs/mcp_system.log

      # Kafka 配置（可选）
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_ENABLED=false

      # 工具执行配置
      - TOOL_EXECUTION_TIMEOUT=30
      - TOOL_MAX_CONCURRENT=10
    volumes:
      - ./logs:/app/logs
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ========================================
  # PostgreSQL 数据库
  # ========================================
  postgres:
    image: postgres:15-alpine
    container_name: mcp-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=mcp_db
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deployment/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # Redis 缓存
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: mcp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redis-password
    volumes:
      - redis-data:/data
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # Kafka（可选）
  # ========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: mcp-zookeeper
    restart: unless-stopped
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - mcp-network
    profiles:
      - kafka

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: mcp-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - mcp-network
    profiles:
      - kafka

  # ========================================
  # Prometheus（监控）
  # ========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: mcp-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./deployment/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - mcp-network
    profiles:
      - monitoring

  # ========================================
  # Grafana（可视化）
  # ========================================
  grafana:
    image: grafana/grafana:latest
    container_name: mcp-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deployment/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    networks:
      - mcp-network
    profiles:
      - monitoring

networks:
  mcp-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  prometheus-data:
  grafana-data:
