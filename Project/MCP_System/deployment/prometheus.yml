# MCP System Prometheus Configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'mcp-system'

scrape_configs:
  # MCP System 服务
  - job_name: 'mcp-system'
    static_configs:
      - targets: ['mcp-system:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # PostgreSQL Exporter（可选）
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # Redis Exporter（可选）
